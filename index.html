<!DOCTYPE html>
<html>
<head>
    <title>Simple Todo App</title>
    <style>
        body{
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:380px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 15px 40px rgba(0,0,0,0.3);
    text-align:center;
}

h2{
    margin-bottom:20px;
    color:#444;
}

input{
    width:70%;
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
    outline:none;
    font-size:14px;
}

input:focus{
    border-color:#667eea;
    box-shadow:0 0 5px rgba(102,126,234,0.5);
}

button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    background:linear-gradient(135deg,#43e97b,#38f9d7);
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

ul{
    list-style:none;
    padding:0;
    margin-top:20px;
}

li{
    padding:10px;
    margin-top:10px;
    background:#f5f5f5;
    border-radius:8px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    animation:fadeIn 0.3s ease;
}

.delete{
    background:#ff4d4d;
    border:none;
    padding:6px 10px;
    border-radius:6px;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

.delete:hover{
    background:#cc0000;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(-10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
    </style>
</head>

<body>

<div class="container">
    <h2>My Todo List</h2>

    <input type="text" id="taskInput" placeholder="Enter task">
    <button onclick="addTask()">Add</button>

    <ul id="taskList"></ul>
</div>

<script>

function addTask(){
    let task = document.getElementById("taskInput").value;

    if(task === ""){
        alert("Enter a task");
        return;
    }

    let li = document.createElement("li");
    li.innerHTML = task;

    let delBtn = document.createElement("button");
    delBtn.innerHTML = "Delete";
    delBtn.className = "delete";

    delBtn.onclick = function(){
        li.remove();
    };

    li.appendChild(delBtn);

    document.getElementById("taskList").appendChild(li);

    document.getElementById("taskInput").value="";
}

</script>

</body>

</html>
